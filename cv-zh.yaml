  headline: 通信工程本科生 · 软件开发者 · HomeLabber · Linux 狂热爱好者
  photo: avatar-circle.png
  location: 山东 青岛
  email: contact@chius.cc
  custom_connections:
    - fontawesome_icon: link
      placeholder: "chius.cc"
      url: https://chius.cc/
    - fontawesome_icon: github
      placeholder: GitHub
      url: https://github.com/chius-me
    - fontawesome_icon: linkedin
      placeholder: LinkedIn
      url: https://linkedin.com/in/chius-me
    - fontawesome_icon: blog
      placeholder: Blog
      url: https://blog.chius.cc/
  sections:
    教育经历:
      - institution: 中国石油大学
        area: 通信工程
        degree: 工学学士
        location: 青岛, 中国
        start_date: 2023-09
        end_date: present
        highlights:
          - "核心课程：C/C++、计算机网络、数据结构、Linux 嵌入式、人工智能模型与算法"

    课程设计:
      - name: 课程设计一（占位，请替换）
        date: 2025-06
        highlights:
          - "项目简介：做了什么，用什么技术栈（占位，请替换）。"
          - "个人贡献：负责了哪部分，实现了什么功能（占位，请替换）。"
      - name: 课程设计二（占位，请替换）
        date: 2024-12
        highlights:
          - "项目简介：做了什么，用什么技术栈（占位，请替换）。"
          - "个人贡献：负责了哪部分，实现了什么功能（占位，请替换）。"

    开源贡献:
      - name: 项目名称（占位，请替换）
        date: 2024 – present
        highlights:
          - "贡献类型：代码贡献 / 文档翻译 / Bug 修复（占位，请替换）。"
          - "具体工作：提交了 N 个 PR，解决了什么问题（占位，请替换）。"
      - name: 项目名称（占位，请替换）
        date: 2024 – present
        highlights:
          - "贡献类型：代码贡献 / 文档翻译 / Bug 修复（占位，请替换）。"
          - "具体工作：提交了 N 个 PR，解决了什么问题（占位，请替换）。"

    比赛经历:
      - name: 比赛名称（占位，请替换）
        date: 2025
        highlights:
          - "比赛简介 + 个人角色（占位，请替换）。"
          - "所做工作 + 最终成绩（占位，请替换）。"
      - name: 比赛名称（占位，请替换）
        date: 2024
        highlights:
          - "比赛简介 + 个人角色（占位，请替换）。"
          - "所做工作 + 最终成绩（占位，请替换）。"

    个人项目:
      - name: HomeLab 网络与虚拟化平台
        date: 2024 – present
        highlights:
          - "自建家庭数据中心，运行 Proxmox VE 虚拟化平台，托管十余个容器与虚拟机。"
          - "配置完整的网络拓扑：VLAN 隔离、DNS 广告过滤、反向代理与内网穿透。"
          - "部署 GitLab CI/CD 流水线，实现个人项目自动化构建与部署。"
      - name: 项目二（占位，请替换）
        date: 2024
        highlights:
          - "项目简介（占位，请替换）。"
          - "技术细节（占位，请替换）。"
      - name: 项目三（占位，请替换）
        date: 2023
        highlights:
          - "项目简介（占位，请替换）。"
          - "技术细节（占位，请替换）。"

    技能:
      - label: 编程语言
        details: Python, C/C++, Bash, SQL, LaTeX
      - label: 开发工具
        details: Git, Docker, Linux, CI/CD, Proxmox VE, Jupyter
      - label: 语言能力
        details: 中文（母语）、英语（CET-4/6 占位）
      - label: 兴趣方向
        details: 分布式系统、自动化运维、开源软件、可复现研究

locale:
  language: mandarin_chinese

design:
  theme: engineeringresumes
  header:
