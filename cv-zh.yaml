cv:
  name: Yao Chius
  headline: 这里是 Chius ! 一位 UPC 在读本科生 🥰 同时也是软件开发者、HomeLabber 和 Linux 狂热爱好者
  photo: avatar-circle.png
  location: 山东青岛
  email: contact@chius.cc
  social_networks:
    - network: GitHub
      username: chius-me
    - network: LinkedIn
      username: chius-me
  sections:
