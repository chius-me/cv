name: Deploy CV to Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - cv.yaml
      - wrangler.toml
      - src/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKER_NAME: cv
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_PROGRESS_BAR: "off"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Cloudflare configuration
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "Missing Cloudflare API token secret"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "Missing CLOUDFLARE_ACCOUNT_ID variable"; exit 1; }

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-rendercv-full-2.8

      - name: Install RenderCV
        run: |
          set -euo pipefail
          if [ ! -f .venv/bin/activate ]; then
            python3 -m venv .venv
            . .venv/bin/activate
            python -m pip install --prefer-binary "rendercv[full]==2.8"
          fi

      - name: Render CV
        run: |
          set -euo pipefail
          . .venv/bin/activate
          rendercv render cv.yaml

      - name: Prepare root PDF page
        run: |
          set -euo pipefail
          cat > rendercv_output/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Yao Chius CV</title>
              <style>
                html, body { height: 100%; margin: 0; }
                iframe { border: 0; height: 100%; width: 100%; }
              </style>
            </head>
            <body>
              <iframe src="Yao_Chius_CV.pdf" title="Yao Chius CV"></iframe>
            </body>
          </html>
          HTML

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache Wrangler
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: wrangler-${{ runner.os }}-latest

      - name: Install Wrangler
        run: |
          set -euo pipefail
          if ! command -v wrangler >/dev/null 2>&1; then
            npm install -g wrangler@latest
          fi

      - name: Deploy to Cloudflare Worker
        run: |
          set -euo pipefail
          wrangler deploy --name "$CLOUDFLARE_WORKER_NAME"