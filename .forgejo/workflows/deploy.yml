name: Deploy CV to Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - cv.yaml
      - wrangler.toml
      - src/**
      - .forgejo/workflows/deploy.yml
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CV_DEPLOY_CLOUDFLAREPAGE }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKER_NAME: cv
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_PROGRESS_BAR: "off"
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Cloudflare configuration
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "Missing Cloudflare API token secret"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "Missing CLOUDFLARE_ACCOUNT_ID variable"; exit 1; }

      - name: Install system dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-pip python3-venv

      - name: Install RenderCV
        run: |
          set -euo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --prefer-binary "rendercv[full]==2.8"

      - name: Render CV
        run: |
          set -euo pipefail
          . .venv/bin/activate
          rendercv render cv.yaml

      - name: Prepare root PDF page
        run: |
          set -euo pipefail
          cat > rendercv_output/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Yao Chius CV</title>
              <style>
                html, body { height: 100%; margin: 0; }
                iframe { border: 0; height: 100%; width: 100%; }
              </style>
            </head>
            <body>
              <iframe src="Yao_Chius_CV.pdf" title="Yao Chius CV"></iframe>
            </body>
          </html>
          HTML

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare Worker
        run: |
          set -euo pipefail
          wrangler deploy --name "$CLOUDFLARE_WORKER_NAME"
