name: Deploy CV to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'cv.yaml'     # 只有当简历源文件修改时才触发发布，避免改一下 README 也乱跑
      - '.forgejo/**'
  workflow_dispatch:  # 保留手动触发按钮，方便调试

jobs:
  deploy:
    runs-on: ubuntu # 使用你刚换的官方全能镜像
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CV_DEPLOY_CLOUDFLAREPAGE }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12.3 & Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: 'pip' # 自动缓存 pip 依赖，第二次跑就会极速秒过

      - name: 🛠️ Install RenderCV & Build
        run: |
          python -m pip install --upgrade pip
          pip install "rendercv[full]"
          rendercv render cv.yaml
          
      # ubuntu-latest 镜像自带 Node.js 环境，所以我们连 setup-node 都省了
      - name: 🚀 Deploy to Cloudflare Pages
        run: npx wrangler pages deploy rendercv_output --project-name=cv