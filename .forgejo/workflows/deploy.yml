name: Deploy CV to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'cv.yaml'     # 只有当简历源文件修改时才触发发布，避免改一下 README 也乱跑
      - '.forgejo/**'
  workflow_dispatch:  # 保留手动触发按钮，方便调试

jobs:
  deploy:
    runs-on: ubuntu # 使用你刚换的官方全能镜像
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CV_DEPLOY_CLOUDFLAREPAGE }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install RenderCV & Build
        run: |
          # 1. 换成国内清华源，解决 pip 下载慢的问题
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          
          # 2. 强行安装，--break-system-packages 专治 PEP668 报错
          python3 -m pip install --upgrade pip --break-system-packages
          pip3 install "rendercv[full]" --break-system-packages
          
          # 3. 渲染
          rendercv render cv.yaml
          
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy rendercv_output --project-name=cv