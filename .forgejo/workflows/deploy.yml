name: Deploy CV to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - cv.yaml
      - .forgejo/workflows/deploy.yml
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CV_DEPLOY_CLOUDFLAREPAGE }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: cv
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Cloudflare configuration
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "Missing CV_DEPLOY_CLOUDFLAREPAGE secret"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "Missing CLOUDFLARE_ACCOUNT_ID variable"; exit 1; }

      - name: Install system dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-pip python3-venv

      - name: Install RenderCV
        run: |
          set -euo pipefail
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "rendercv[full]"

      - name: Render CV
        run: |
          set -euo pipefail
          . .venv/bin/activate
          rendercv render cv.yaml

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare Pages
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"
          wrangler pages deploy rendercv_output --project-name="$CLOUDFLARE_PROJECT_NAME" --branch="$branch"
