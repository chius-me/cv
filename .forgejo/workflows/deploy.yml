name: Deploy CV to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'cv.yaml'     # 只有当简历源文件修改时才触发发布，避免改一下 README 也乱跑
      - '.forgejo/**'
  workflow_dispatch:  # 保留手动触发按钮，方便调试

jobs:
  deploy:
    runs-on: ubuntu # 使用你刚换的官方全能镜像
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CV_DEPLOY_CLOUDFLAREPAGE }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install RenderCV & Build
        run: |
          # 1. 创建一个完全隔离的虚拟环境，起名叫 .venv
          python3 -m venv .venv
          
          # 2. 激活虚拟环境
          # 激活后，所有的 pip 安装都会进到 .venv 目录里，绝不触碰系统文件，也就不再报错
          source .venv/bin/activate
          
          # 3. 在虚拟环境里换源并安装 (这里不需要 --break-system-packages 了)
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install "rendercv[full]"
          
          # 4. 执行渲染
          rendercv render cv.yaml
          
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy rendercv_output --project-name=cv