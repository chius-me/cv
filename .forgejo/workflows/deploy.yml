name: Deploy CV to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: node
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CV_DEPLOY_CLOUDFLAREPAGE }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 优化 1：使用 setup-python 自动安装 Python 并开启 pip 缓存
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 
          cache: 'pip' # 魔法指令：自动缓存 ~/.cache/pip

      # 优化 2：去掉了冗长的 apt-get 和 venv，直接无脑 install
      - name: Install RenderCV & Build
        run: |
          python -m pip install --upgrade pip
          pip install "rendercv[full]"
          rendercv render cv.yaml

      # 优化 3：废弃 npm install -g，使用 npx 实时调用并利用 npm 的默认缓存机制
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy rendercv_output --project-name=cv