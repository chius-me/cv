design:
  theme: classic
  page:
    size: us-letter
    top_margin: 2cm
    bottom_margin: 2cm
    left_margin: 2cm
    right_margin: 2cm
  colors:
    text: "#111111"
    name: "#111111"
    connections: "#333333"
    section_titles: "#111111"
    links: "#004f9f"
  text:
    font_family: New Computer Modern
    font_size: 10pt
    leading: 0.6em
  links:
    underline: false
    use_external_link_icon: true
  header:
    name_font_size: 24pt
    name_bold: true
    photo_width: 3.5cm
    vertical_space_between_name_and_connections: 0.7cm
  section_titles:
    type: with-full-line
    font_size: 1.2em
    bold: true
    vertical_space_above: 0.55cm
    vertical_space_below: 0.25cm
  entries:
    date_and_location_width: 4.15cm
    left_and_right_margin: 0.2cm
    horizontal_space_between_columns: 0.12cm
    vertical_space_between_entries: 0.25cm
    allow_page_break_in_sections: true
    allow_page_break_in_entries: true
  highlights:
    bullet: "-"
    top_margin: 0.12cm
    left_margin: 0.35cm
    vertical_space_between_highlights: 0.08cm

rendercv_settings:
  render_command:
    output_folder_name: rendercv_output
    dont_generate_html: false
    dont_generate_markdown: false
    dont_generate_png: true
